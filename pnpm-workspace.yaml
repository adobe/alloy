packages:
  - .
  - sandboxes/*
  - packages/*
  - packages/reactor-extension/scripts/helpers/parcel-transformer-extension-name
linkWorkspacePackages: true
minimumReleaseAge: 2880 # 2 days
minimumReleaseAgeExclude:
  - "@adobe/alloy"
  - "@adobe/alloy-core"
  - "@adobe/aep-rules-engine"
  - "@adobe/reactor-sandbox"
  - "@adobe/reactor-turbine"
  - "@adobe/reactor-turbine-schemas"
ignoredBuiltDependencies:
  - core-js
  - lmdb
  - msgpackr-extract
onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - msw
  - puppeteer
verifyDepsBeforeRun: warn
