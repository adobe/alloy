name: Version and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: version-and-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Detects whether there is work to do and whether a Production approval gate
  # is required. Stable releases (no pre.json) require approval; beta pushes
  # do not.
  guard:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.check.outputs.changes_detected }}
      changed_jira_files: ${{ steps.check.outputs.changed_jira_files }}
      approval_needed: ${{ steps.check.outputs.approval_needed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Detect changes and approval requirement
        id: check
        run: bash scripts/ci/guard.sh

  # Requests a manual approval from the Production environment reviewers.
  # Only runs for stable (non-beta) releases with pending changesets.
  approve:
    needs: guard
    if: needs.guard.outputs.approval_needed == 'true'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - run: echo "Release approved"

  # Applies all pending work (changesets + JIRA files) in a single commit,
  # then publishes to npm and runs side-effect deploys.
  apply:
    needs: [guard, approve]
    if: |
      always() &&
      needs.guard.outputs.changes_detected == 'true' &&
      (
        needs.guard.outputs.approval_needed == 'false' ||
        needs.approve.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: Apply changesets
        run: bash scripts/ci/apply-changesets.sh

      - name: Apply JIRA changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_JIRA_FILES: ${{ needs.guard.outputs.changed_jira_files }}
        run: bash scripts/ci/apply-jira.sh

      - name: Commit all changes
        run: bash scripts/ci/commit.sh

      - name: Publish to npm
        run: bash scripts/ci/publish.sh

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CDN_PRIVATE_KEY }}

      - name: Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REACTOR_IO_INTEGRATION_CLIENT_SECRET: ${{ secrets.REACTOR_IO_INTEGRATION_CLIENT_SECRET }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_RIVER_0EC96991E }}
        run: bash scripts/ci/deploy.sh
