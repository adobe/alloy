name: Version and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: version-and-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Applies any pending .jira/*.yml changes to JIRA on every push to main.
  apply-jira:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
      pull-requests: write
    env:
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Detect changed .jira files
        id: jira-files
        run: |
          changed=$(git diff HEAD^1 HEAD --name-only -- '.jira/*.yml' | tr '\n' ' ')
          echo "files=$changed" >> "$GITHUB_OUTPUT"
          if [ -n "$changed" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR context
        id: pr-context
        if: steps.jira-files.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_info=$(gh pr list --state merged --base main --limit 5 --json number,url,title \
            --jq 'map(select(.number != null)) | first')
          pr_number=$(echo "$pr_info" | jq -r '.number // ""')
          pr_url=$(echo "$pr_info"    | jq -r '.url   // ""')
          pr_title=$(echo "$pr_info"  | jq -r '.title // ""')
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url"       >> "$GITHUB_OUTPUT"
          echo "pr_title=$pr_title"   >> "$GITHUB_OUTPUT"

      - name: Apply JIRA changes and fetch updated state
        id: apply-jira
        if: steps.jira-files.outputs.has_changes == 'true'
        env:
          GITHUB_PR_URL: ${{ steps.pr-context.outputs.pr_url }}
          GITHUB_PR_TITLE: ${{ steps.pr-context.outputs.pr_title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          applied_tickets=""
          for file in ${{ steps.jira-files.outputs.files }}; do
            ticket_key=$(node scripts/jira/process.mjs "$file")
            [ -n "$ticket_key" ] && applied_tickets="$applied_tickets $ticket_key"
          done
          echo "tickets=$applied_tickets" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed .jira files
        if: steps.jira-files.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- '.jira/'
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh JIRA details [skip ci]"
            git push origin HEAD:main
          fi

      - name: Post PR comment with JIRA tickets
        if: >
          steps.jira-files.outputs.has_changes == 'true' &&
          steps.apply-jira.outputs.tickets != '' &&
          steps.pr-context.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tickets="${{ steps.apply-jira.outputs.tickets }}"
          base_url="https://jira.corp.adobe.com/browse"
          body="**JIRA tickets updated by this PR:**"$'\n'
          for key in $tickets; do
            body="$body"$'\n'"- [$key]($base_url/$key)"
          done
          gh pr comment ${{ steps.pr-context.outputs.pr_number }} --body "$body"

  # Cheap gate so the Production approval is only requested when there's
  # actual release work (changesets exist) or the operator forced a run.
  detect:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          shopt -s nullglob
          changesets=()
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] || changesets+=("$f")
          done
          if [ ${#changesets[@]} -gt 0 ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: [detect, apply-jira]
    if: needs.detect.outputs.proceed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
      pull-requests: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # use the SSH deploy key for all future git actions to bypass branch protection
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Bump versions and push the release commit BEFORE anything irreversible.
      # `changeset version` is a no-op when changesets are absent, so this
      # whole step idempotently does nothing on a retry.
      - name: Version, commit, push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm changeset version
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull any commits made by apply-jira before pushing (e.g. JIRA detail refresh)
          git pull --rebase origin main
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish [skip ci]"
            git push origin HEAD:main
          fi

      # changeset publish skips already-on-npm versions; with
      # privatePackages.tag: true in .changeset/config.json it also tags the
      # private packages so all four share a uniform release marker.
      # `changeset publish` only tags what it just published, so a retry after a
      # post-publish crash drops the tag; `changeset tag` idempotently backfills it.
      - name: Publish + tag
        run: |
          pnpm changeset publish
          pnpm changeset tag
          git push --tags

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CDN_PRIVATE_KEY }}

      # Each package owns its deploy via a `release` script that's idempotent
      - name: Side-effect deploys
        env:
          REACTOR_IO_INTEGRATION_CLIENT_SECRET: ${{ secrets.REACTOR_IO_INTEGRATION_CLIENT_SECRET }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_RIVER_0EC96991E }}
        run: pnpm --recursive --workspace-concurrency=1 --no-bail --if-present run release

      # Iterates git tags at HEAD; skips existing releases.
      - name: GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/createGithubReleases.js

      # After a stable release, prep the next cycle by re-entering pre mode.
      - name: Re-enter beta pre-mode after stable
        run: |
          [ -f .changeset/pre.json ] && exit 0
          pnpm changeset pre enter beta
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore: re-enter beta pre mode [skip ci]"
          git push origin HEAD:main
