name: Changeset Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: changeset-publish-${{ github.ref }}

jobs:
  # Determine if there are changesets to publish and if we are in prerelease mode.
  analyze:
    # Avoid re-running when the bot pushes the version bump commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      has_releases: ${{ steps.release_plan.outputs.has_releases }}
      is_prerelease: ${{ steps.pre.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}

      - name: Determine prerelease mode
        id: pre
        run: |
          if [ -f .changeset/pre.json ]; then
            # @type {string} "pre" | "exit" | "" — changeset prerelease mode
            MODE=$(jq -r '.mode // empty' .changeset/pre.json)
          else
            MODE=""
          fi

          if [ "${MODE}" = "pre" ]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            if [ -n "${MODE}" ]; then
              echo "Prerelease mode: ${MODE}"
            else
              echo "Prerelease mode: stable"
            fi
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Compute release plan
        id: release_plan
        run: |
          shopt -s nullglob
          # @type {string[]} glob-expanded file paths — e.g. (.changeset/few-pens-build.md ...)
          FILES=(.changeset/*.md)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "has_releases=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # `changeset status` writes JSON to the provided filename, relative to cwd.
          pnpm install --frozen-lockfile
          pnpm exec changeset status --verbose --output=changeset-status.json
          echo "Release plan (changeset-status.json):"
          jq . changeset-status.json
          if jq -e '(.releases // []) | length > 0' changeset-status.json >/dev/null; then
            echo "Release summary:"
            jq -r '.releases[] | "- \(.name) -> \(.newVersion) (\(.type))"' changeset-status.json
          else
            echo "Release summary: none"
          fi
          # @type {string} "true" | "false"
          HAS_RELEASES=$(jq -r 'if (.releases // []) | length > 0 then "true" else "false" end' changeset-status.json)
          echo "has_releases=${HAS_RELEASES}" >> "${GITHUB_OUTPUT}"

      - name: No release changesets, skipping publish
        if: steps.release_plan.outputs.has_releases != 'true'
        run: echo "No pending changesets; skipping publish."

  publish:
    needs: analyze
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.analyze.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    # Pause for manual approval before publishing (prerelease or stable).
    environment: Production
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}

      - name: Verify main has not moved
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::origin/main has moved since this workflow started. Aborting to avoid conflicts."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version @adobe/alloy & generate CHANGELOG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec changeset status --verbose --output=changeset-status.json
          if jq -e '(.releases // []) | length > 0' changeset-status.json >/dev/null; then
            echo "Release summary:"
            jq -r '.releases[] | "- \(.name) -> \(.newVersion) (\(.type))"' changeset-status.json
          else
            echo "Release summary: none"
          fi
          pnpm changeset version
          # @type {string} semver — e.g. "2.31.2-beta.0"
          VERSION=$(jq -r '.version' packages/browser/package.json)
          echo "@adobe/alloy version after versioning: ${VERSION}"

      - name: Update lockfile
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build @adobe/alloy (browser)
        run: pnpm --filter @adobe/alloy run build

      - name: Commit version changes & CHANGELOG.md files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: publish [skip ci]"
          fi

      - name: "Publish @adobe/alloy prerelease (beta)"
        if: needs.analyze.outputs.is_prerelease == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          # @type {string} semver — e.g. "2.31.2-beta.0"
          VERSION=$(jq -r '.version' packages/browser/package.json)
          echo "Publishing @adobe/alloy prerelease (pre mode). Version: ${VERSION}"
          pnpm changeset publish

      - name: "Tag @adobe/alloy prerelease (npm dist-tag: next)"
        if: needs.analyze.outputs.is_prerelease == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          if [ ! -f changeset-status.json ]; then
            echo "::error::changeset-status.json not found; cannot tag prerelease."
            exit 1
          fi

          # @type {json} string[] — e.g. ["@adobe/alloy"]
          PUBLIC=$(
            pnpm ls -r --json --depth -1 \
              | jq '[.[] | select(.private | not) | .name]'
          )
          # @type {string} newline-delimited — e.g. "@adobe/alloy@2.31.2-beta.0"
          TAG_ENTRIES=$(
            jq -r --argjson pub "$PUBLIC" '
              .releases // []
              | .[]
              | select(.name | IN($pub[]))
              | "\(.name)@\(.newVersion)"
            ' changeset-status.json
          )

          if [ -z "${TAG_ENTRIES}" ]; then
            echo "No releases in changeset-status.json; skipping dist-tagging."
            exit 0
          fi

          echo "Applying npm dist-tag next to @adobe/alloy prerelease:"
          echo "${TAG_ENTRIES}" | sed 's/^/- /'
          while IFS= read -r pkg; do
            if [ -n "${pkg}" ]; then
              npm dist-tag add "${pkg}" next
            fi
          done <<< "${TAG_ENTRIES}"

      - name: "Publish @adobe/alloy (stable -> npm tag: latest)"
        if: needs.analyze.outputs.is_prerelease != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          # @type {string} semver — e.g. "2.31.2"
          VERSION=$(jq -r '.version' packages/browser/package.json)
          echo "Publishing @adobe/alloy stable (npm tag: latest). Version: ${VERSION}"
          pnpm changeset publish

      # rebuilding because `changeset publish` wipes out build artifacts
      - name: Rebuild @adobe/alloy browser artifacts for CDN upload
        run: pnpm --filter @adobe/alloy run build

      - name: Start ssh-agent for CDN
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.CDN_PRIVATE_KEY }}

      - name: Upload browser artifacts to CDN
        run: node scripts/uploadToCDN.js

      - name: Re-enter beta prerelease mode for next cycle after a stable release
        if: needs.analyze.outputs.is_prerelease != 'true'
        run: pnpm changeset pre enter beta

      - name: Commit and push changes + tags
        run: |
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: post-publish [skip ci]"
          fi
          git push --follow-tags

      - name: Create GitHub Release (notes from @adobe/alloy CHANGELOG)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # @type {string} semver — e.g. "2.31.2-beta.0"
          VERSION=$(jq -r '.version' packages/browser/package.json)
          # @type {string} git tag / release name — e.g. "@adobe/alloy@2.31.2-beta.0"
          TAG="@adobe/alloy@${VERSION}"

          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} not found locally; skipping GitHub release."
            exit 0
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists; skipping."
            exit 0
          fi

          # @type {string} path to @adobe/alloy CHANGELOG
          CHANGELOG="packages/browser/CHANGELOG.md"
          if [ ! -f "${CHANGELOG}" ]; then
            echo "::error::${CHANGELOG} not found; cannot create GitHub release notes."
            exit 1
          fi

          # @type {string} absolute file path — e.g. "/tmp/tmp.aBcDeFgH"
          NOTES_FILE="$(mktemp)"
          awk -v ver="${VERSION}" '
            $0 == "## " ver { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' "${CHANGELOG}" > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "::error::Could not extract notes for version ${VERSION} from ${CHANGELOG}"
            exit 1
          fi

          # @type {string[]} gh release flags — e.g. (--prerelease) or ()
          FLAGS=()
          if [ "${{ needs.analyze.outputs.is_prerelease }}" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          echo "Creating GitHub release ${TAG} (prerelease: ${{ needs.analyze.outputs.is_prerelease }})"
          echo "Release notes preview:"
          head -n 20 "${NOTES_FILE}"
          gh release create "${TAG}" --title "${TAG}" --notes-file "${NOTES_FILE}" "${FLAGS[@]}"
