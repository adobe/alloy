name: Changeset Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: changeset-publish-${{ github.ref }}

jobs:
  # Determine if there are changesets to publish and if we are in prerelease mode.
  analyze:
    runs-on: ubuntu-latest
    outputs:
      has_releases: ${{ steps.release_plan.outputs.has_releases }}
      is_prerelease: ${{ steps.pre.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}

      - name: Determine prerelease mode
        id: pre
        run: |
          if [ -f .changeset/pre.json ]; then
            # @type {string} "pre" | "exit" | "" — changeset prerelease mode
            MODE=$(jq -r '.mode // empty' .changeset/pre.json)
          else
            MODE=""
          fi

          if [ "${MODE}" = "pre" ]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            if [ -n "${MODE}" ]; then
              echo "Prerelease mode: ${MODE}"
            else
              echo "Prerelease mode: stable"
            fi
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Compute release plan
        id: release_plan
        run: |
          shopt -s nullglob
          # @type {string[]} glob-expanded file paths — e.g. (.changeset/few-pens-build.md ...)
          FILES=(.changeset/*.md)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "has_releases=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # `changeset status` writes JSON to the provided filename, relative to cwd.
          pnpm install --frozen-lockfile
          pnpm exec changeset status --verbose --output=changeset-status.json
          echo "Release plan (changeset-status.json):"
          jq . changeset-status.json
          if jq -e '(.releases // []) | length > 0' changeset-status.json >/dev/null; then
            echo "Release summary:"
            jq -r '.releases[] | "- \(.name) -> \(.newVersion) (\(.type))"' changeset-status.json
          else
            echo "Release summary: none"
          fi
          # @type {string} "true" | "false"
          HAS_RELEASES=$(jq -r 'if (.releases // []) | length > 0 then "true" else "false" end' changeset-status.json)
          echo "has_releases=${HAS_RELEASES}" >> "${GITHUB_OUTPUT}"

      - name: No release changesets, skipping publish
        if: steps.release_plan.outputs.has_releases != 'true'
        run: echo "No pending changesets; skipping publish."

  publish:
    needs: analyze
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.analyze.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    # Pause for manual approval before publishing (prerelease or stable).
    environment: Production
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.ALLOY_BOT_GITHUB_SSH_PRIVATE_KEY }}

      - name: Verify main has not moved
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::origin/main has moved since this workflow started. Aborting to avoid conflicts."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @adobe/alloy exec playwright install chromium

      - name: Version packages & generate CHANGELOGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec changeset status --verbose --output=changeset-status.json
          if jq -e '(.releases // []) | length > 0' changeset-status.json >/dev/null; then
            echo "Release summary:"
            jq -r '.releases[] | "- \(.name) -> \(.newVersion) (\(.type))"' changeset-status.json
          else
            echo "Release summary: none"
          fi
          pnpm changeset version
          echo "Package versions after versioning:"
          for pkg in packages/*/package.json; do
            jq -r '"- \(.name)@\(.version)"' "$pkg"
          done

      - name: Update lockfile
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm -r --if-present run build

      - name: Commit version changes & CHANGELOG.md files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: publish [skip ci]"
          fi

      - name: "Publish packages prerelease (beta)"
        if: needs.analyze.outputs.is_prerelease == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          echo "Publishing prerelease (pre mode):"
          for pkg in packages/*/package.json; do
            jq -r '"- \(.name)@\(.version)"' "$pkg"
          done
          pnpm changeset publish

      - name: "Tag prereleases (npm dist-tag: next)"
        if: needs.analyze.outputs.is_prerelease == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          if [ ! -f changeset-status.json ]; then
            echo "::error::changeset-status.json not found; cannot tag prerelease."
            exit 1
          fi

          # @type {json} string[] — e.g. ["@adobe/alloy"]
          PUBLIC=$(
            pnpm ls -r --json --depth -1 \
              | jq '[.[] | select(.private | not) | .name]'
          )
          # @type {string} newline-delimited — e.g. "@adobe/alloy@2.31.2-beta.0"
          TAG_ENTRIES=$(
            jq -r --argjson pub "$PUBLIC" '
              .releases // []
              | .[]
              | select(.name | IN($pub[]))
              | "\(.name)@\(.newVersion)"
            ' changeset-status.json
          )

          if [ -z "${TAG_ENTRIES}" ]; then
            echo "No releases in changeset-status.json; skipping dist-tagging."
            exit 0
          fi

          echo "Applying npm dist-tag next to prereleases:"
          echo "${TAG_ENTRIES}" | sed 's/^/- /'
          while IFS= read -r pkg; do
            if [ -n "${pkg}" ]; then
              npm dist-tag add "${pkg}" next
            fi
          done <<< "${TAG_ENTRIES}"

      - name: "Publish packages (stable -> npm tag: latest)"
        if: needs.analyze.outputs.is_prerelease != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
        run: |
          echo "Publishing stable (npm tag: latest):"
          for pkg in packages/*/package.json; do
            jq -r '"- \(.name)@\(.version)"' "$pkg"
          done
          pnpm changeset publish

      # rebuilding because `changeset publish` wipes out build artifacts
      - name: Rebuild browser artifacts for CDN upload
        run: pnpm --filter @adobe/alloy run build

      - name: Start ssh-agent for CDN
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.CDN_PRIVATE_KEY }}

      - name: Upload browser artifacts to CDN
        run: node scripts/uploadToCDN.js

      - name: Package and deploy extension to Reactor (when @adobe/alloy was released)
        # Wrapped in a retry because @adobe/reactor-uploader@6.0.0-beta.12 hardcodes
        # MAX_RETRIES=50 with 1s polls (~50s) for post-upload processing, which
        # occasionally exceeds Reactor's actual processing time. Re-uploading the
        # same version is idempotent: the uploader updates the existing development
        # extension package by name.
        if: hashFiles('packages/reactor-extension/package.json') != ''
        uses: nick-fields/retry@v3
        env:
          REACTOR_IO_INTEGRATION_CLIENT_SECRET: ${{ secrets.REACTOR_IO_INTEGRATION_CLIENT_SECRET }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if ! jq -e '.releases[] | select(.name=="reactor-extension-alloy")' changeset-status.json >/dev/null; then
              echo "reactor-extension-alloy was not in this release; skipping extension deploy."
              exit 0
            fi
            EXT_VERSION=$(node -p "require('./packages/reactor-extension/package.json').version")
            pnpm --filter reactor-extension-alloy run build
            node scripts/deployExtensionToReactor.mjs "${EXT_VERSION}"

      - name: Restore extension workspace protocol for @adobe/alloy
        if: hashFiles('packages/reactor-extension/package.json') != ''
        run: |
          if ! jq -e '.releases[] | select(.name=="@adobe/alloy")' changeset-status.json >/dev/null; then exit 0; fi
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('packages/reactor-extension/package.json', 'utf8'));
            if (p.dependencies['@adobe/alloy']) p.dependencies['@adobe/alloy'] = 'workspace:*';
            fs.writeFileSync('packages/reactor-extension/package.json', JSON.stringify(p, null, 2));
          "
          git add packages/reactor-extension/package.json

      - name: Re-enter beta prerelease mode for next cycle after a stable release
        if: needs.analyze.outputs.is_prerelease != 'true'
        run: pnpm changeset pre enter beta

      - name: Commit and push changes + tags
        run: |
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: post-publish [skip ci]"
          fi
          git push --follow-tags

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/createGithubReleases.js changeset-status.json
