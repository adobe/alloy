name: Quality Checks
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    name: "Quality checks"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        check:
          - build
          - lint
          - "format:check"
          - typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.check }}
  tests:
    name: "Tests"
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
        env:
          BUILD_NUMBER: $GITHUB_RUN_NUMBER
          BUILD_ID: $GITHUB_RUN_ID
          JOB_NUMBER: $GITHUB_JOB
