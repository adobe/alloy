name: Extension quality checks

on:
  push:
    branches: [main]
    paths: ["packages/reactor-extension/**"]
  pull_request:
    paths: ["packages/reactor-extension/**"]
  workflow_dispatch:

jobs:
  extension-quality:
    name: Extension build, lint, format, tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        check:
          - build
          - lint
          - "format:check"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm run build:all
      - name: Run ${{ matrix.check }}
        run: |
          if [ "${{ matrix.check }}" = "build" ]; then
            pnpm run build:all
          else
            pnpm run ${{ matrix.check }}
          fi

  extension-tests:
    name: Extension tests
    needs: extension-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - unit
          - integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm run build:all
      - name: Run test:${{ matrix.test }}
        run: pnpm --filter reactor-extension-alloy run test:${{ matrix.test }}
