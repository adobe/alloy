<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="stylesheet" href="/index.css" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#000000" />
    <script src="https://cdn.jsdelivr.net/npm/promise-polyfill@8/dist/polyfill.min.js"></script>

    <title>Mock website hosting Alloy</title>

    <script>
      function includeScript(src) {
        return new Promise(function(resolve, reject) {
          var tag = document.createElement("script");
          tag.type = "text/javascript";
          tag.async = true;
          tag.addEventListener("load", function() {
            resolve();
          });
          tag.nonce = "%REACT_APP_NONCE%";
          tag.src = src;
          document.head.appendChild(tag);
        });
      }
      includeScript("../alloy.js");
    </script>

    <!-- prettier-ignore -->
    <script nonce="%REACT_APP_NONCE%">
      !function(e,a,n,t){var i=e.head;if(i){
        if (a) return;
        var o=e.createElement("style");
        o.setAttribute("nonce", "%REACT_APP_NONCE%");
        o.id="alloy-prehiding",o.innerText=n,i.appendChild(o),
          setTimeout(function(){o.parentNode&&o.parentNode.removeChild(o)},t)}}
      (document, document.location.href.indexOf("mboxEdit") !== -1, ".personalization-container { opacity: 0 !important }", 3000);
    </script>

    <!-- prettier-ignore -->
    <script nonce="%REACT_APP_NONCE%">
      !function(n,o){o.forEach(function(o){n[o]||((n.__alloyNS=n.__alloyNS||
        []).push(o),n[o]=function(){var u=arguments;return new Promise(
        function(i,l){n[o].q.push([i,l,u])})},n[o].q=[])})}
      (window,["alloy"]);
    </script>

    <script nonce="%REACT_APP_NONCE%">
      alloy("configure", {
        defaultConsent: "in",
        edgeDomain:
          location.host.indexOf("alloyio.com") !== -1
            ? "firstparty.alloyio.com"
            : undefined,
        edgeBasePath: "ee",
        edgeConfigId: "7f256d21-f4ee-473e-8e66-1fb57f32c0c4",
        orgId: "97D1F3F459CE0AD80A495CBE@AdobeOrg", // UnifiedJS
        debugEnabled: true,
        idMigrationEnabled: false,
        prehidingStyle: ".personalization-container { opacity: 0 !important }",
        onBeforeEventSend: function(options) {},
        targetMigrationEnabled: true
      });
    </script>
    <script>
      function sendNotification(notificationType, payload) {
        return alloy("sendEvent", {
          xdm: {
            eventType: notificationType,
            _experience: {
              decisioning: {
                propositions: payload
              }
            }
          }
        });
      }

      function onClickFirstButton() {
        return getOffer("first-container")
          .then(result => {
            const renderedPropositions = [];
            result.forEach(prop => {
              const propPayload = {
                id: prop.id,
                scope: prop.scope,
                scopeDetails: prop.scopeDetails
              };
              prop.items.forEach(item => {
                const element = document.getElementById("firstContainer");
                try {
                  if (
                    item.schema ===
                    "https://ns.adobe.com/personalization/html-content-item"
                  ) {
                    element.innerHTML = item.data.content;
                    renderedPropositions.push(propPayload);
                  }
                  if (
                    item.schema ===
                    "https://ns.adobe.com/personalization/measurement"
                  ) {
                    element.addEventListener(
                      "click",
                      sendNotification("click", [propPayload])
                    );
                  }
                } catch (e) {
                  console.log("error applying html offer", e);
                }
              });
            });

            return renderedPropositions;
          })
          .then(payload => sendNotification("display", payload));
      }

      function onClickSecondButton() {
        return getOffer("second-container").then(result => {
          const renderedPropositions = {};
          result.forEach(prop => {
            const propPayload = {
              id: prop.id,
              scope: prop.scope,
              scopeDetails: prop.scopeDetails
            };

            prop.items.forEach(item => {
              const element = document.getElementById("secondContainer");
              try {
                if (
                  item.schema ===
                  "https://ns.adobe.com/personalization/html-content-item"
                ) {
                  element.innerHTML = item.data.content;
                  renderedPropositions[prop.id] = propPayload;
                }
              } catch (e) {
                console.log("error applying html offer", e);
              }
            });
          });
        });
      }

      function getOffer(propositionScope) {
        return alloy("sendEvent", { decisionScopes: [propositionScope] }).then(
          result => {
            const propositions = result.propositions;
            const proposition = propositions.filter(
              prop => prop.scope === propositionScope
            );
            return proposition;
          }
        );
      }
    </script>
  </head>
  <body>
    <h2>Hello World!</h2>
    <div id="root">
      <div>
        <h3>
          This button retrieves the form based composed offer and applies it,
          and sends a display event.
        </h3>
        <div id="firstContainer"></div>
        <button onClick="onClickFirstButton()" name="First Container offer">
          First Container offer
        </button>
      </div>
      <div>
        <h3>
          This button retrieves the form based composed offer and applies it,
          but doesn't send a display event.
        </h3>
        <div id="secondContainer"></div>
        <button onClick="onClickSecondButton()" name="Second Container offer">
          Second Container offer
        </button>
      </div>
    </div>
  </body>
</html>
